plugins {
    id 'org.jetbrains.kotlin.jvm'
    id 'maven-publish'
}

kotlin {
    jvmToolchain(17)
}

repositories {
    google()
    mavenCentral()
    maven { url 'https://jitpack.io' }
}

dependencies {
    implementation 'com.android.tools.build:apksig:8.9.1'
    implementation 'com.github.rtyley:spongycastle:sc-v1.58.0.0'
}

publishing {
    publications {
        maven(MavenPublication) {
            groupId = 'com.zovex'
            artifactId = 'signer'
            version = '1.0.3'
            from components.java
        }
    }
    repositories {
        maven {
            name = "GitHubPackages"
            url = uri("https://maven.pkg.github.com/davidggjg/zovex-signer")
            credentials {
                username = System.getenv("GITHUB_ACTOR")
                password = System.getenv("GITHUB_TOKEN")
            }
        }
    }
}
