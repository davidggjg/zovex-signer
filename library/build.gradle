plugins {
    id 'org.jetbrains.kotlin.jvm'
    id 'maven-publish'
    id 'com.gradleup.shadow'
}

kotlin { jvmToolchain(17) }

repositories {
    google()
    mavenCentral()
    gradlePluginPortal()
}

dependencies {
    implementation 'com.android.tools.build:apksig:8.9.1'
    implementation 'org.bouncycastle:bcprov-jdk18on:1.78.1'
    implementation 'org.bouncycastle:bcpkix-jdk18on:1.78.1'
}

shadowJar {
    relocate 'org.bouncycastle', 'com.zovex.bc'
    relocate 'org.objectweb', 'com.zovex.ow'
}

publishing {
    publications {
        maven(MavenPublication) {
            groupId = 'com.zovex'
            artifactId = 'signer'
            version = '3.0.0'
            artifact(tasks.shadowJar) { classifier = null }
        }
    }
    repositories {
        maven {
            name = "GitHubPackages"
            url = uri("https://maven.pkg.github.com/davidggjg/zovex-signer")
            credentials {
                username = System.getenv("GITHUB_ACTOR")
                password = System.getenv("GITHUB_TOKEN")
            }
        }
    }
}
